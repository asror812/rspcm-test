spring:
  application:
    name: rspcm

  profiles:
    active: local

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:10}
  mail:
    from: ${MAIL_FROM:no-reply@rspcm.local}
  admin:
    enabled: ${INMEMORY_ADMIN_ENABLED:true}
    username: ${INMEMORY_ADMIN_USERNAME:admin@rspcm}
    password: ${INMEMORY_ADMIN_PASSWORD:123}
    full-name: ${INMEMORY_ADMIN_FULL_NAME:Super Admin}