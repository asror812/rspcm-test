spring:
  application:
    name: rspcm

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:10}

  mail:
    from: ${MAIL_FROM:no-reply@rspcm.local}

  admin:
    enabled: ${INMEMORY_ADMIN_ENABLED:true}
    username: ${INMEMORY_ADMIN_USERNAME:admin@rspcm}
    password: ${INMEMORY_ADMIN_PASSWORD}
    full-name: ${INMEMORY_ADMIN_FULL_NAME:Super Admin}
